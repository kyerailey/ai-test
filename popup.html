<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 400px; font-family: 'Segoe UI', sans-serif; padding: 15px; background-color: #f8f9fa; }
    body.large-mode { width: 800px; height: 600px; }
    .controls { display: flex; flex-direction: column; gap: 12px; }
    select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; background: white; }
    .btn-group { display: flex; gap: 10px; }
    button { padding: 10px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; flex: 1; }
    #scrapeBtn { background: #28a745; color: white; }
    #scrapeBtn:disabled { background: #adb5bd; cursor: not-allowed; }
    #resizeToggle { background: #007bff; color: white; }
    #statusMessage { font-size: 12px; color: #6c757d; text-align: center; margin-top: 5px; }
    #resultsContainer { margin-top: 20px; max-height: 400px; overflow-y: auto; padding: 5px; }
    #gradModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:999; justify-content:center; align-items:center; }
    #gradModal.show { display:flex; }
    #gradModalBox { background:white; padding:20px; border-radius:8px; width:280px; font-family:'Segoe UI',sans-serif; }
    #gradModalBox h3 { margin:0 0 12px; font-size:14px; }
    #gradModalBox input { width:100%; padding:8px; border:1px solid #ddd; border-radius:5px; font-size:13px; box-sizing:border-box; }
    #gradModalBox .hint { font-size:11px; color:#888; margin-top:4px; }
    #gradModalBox .btn-row { display:flex; gap:8px; margin-top:14px; }
    #gradModalBox .btn-row button { flex:1; padding:9px; border:none; border-radius:5px; font-weight:bold; cursor:pointer; }
    #modalConfirm { background:#461D7C; color:white; }
    #modalCancel { background:#e9ecef; color:#333; }
  </style>
</head>
<body>
  <div style="text-align: center; font-size: 11px; color: #555; font-weight: bold; margin-bottom: 8px;" id="versionLabel"></div>
  <div class="controls">
    <select id="yearDropdown">
      <option value="" disabled selected>Loading Catalog Years...</option>
    </select>
    <div class="btn-group">
      <button id="scrapeBtn" disabled>Analyze Audit</button>
      <button id="pdfBtn" style="background: #461D7C; color: white;" disabled>Export PDF</button>
      <button id="resizeToggle">Toggle Large View</button>
    </div>
    <div id="statusMessage">Please select a year to begin.</div>
    
  </div>
  <div id="resultsContainer"></div>
  <script src="libs/pdf-lib.min.js"></script>
  <script src="popup.js"></script>

  <div id="gradModal">
  <div id="gradModalBox">
    <h3>Enter Anticipated Graduation Date</h3>
    <input type="text" id="gradInput" placeholder="MM/YYYY" maxlength="7" />
    <div class="hint">Format: MM/YYYY (e.g. 05/2026 or 12/2026)</div>
    <div class="btn-row">
      <button id="modalCancel">Cancel</button>
      <button id="modalConfirm">Generate PDF</button>
    </div>
  </div>
</div>
</body>
</html>
